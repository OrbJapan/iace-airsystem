<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR Pass Features Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }
        .markdown-body h1 {
            font-size: 2em;
            font-weight: 600;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.3em;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .markdown-body h2 {
            font-size: 1.5em;
            font-weight: 600;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.3em;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .markdown-body h3 {
            font-size: 1.25em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .markdown-body h4 {
            font-size: 1em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .markdown-body p {
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-body li {
            margin-top: 0.25em;
        }
        .markdown-body code {
            background-color: rgba(175, 184, 193, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: ui-monospace, monospace;
            font-size: 85%;
        }
        .markdown-body pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            font-size: 85%;
            line-height: 1.45;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-body table th,
        .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #d0d7de;
        }
        .markdown-body table th {
            background-color: #f6f8fa;
            font-weight: 600;
        }
        .markdown-body table tr {
            background-color: #ffffff;
            border-top: 1px solid #d0d7de;
        }
        .markdown-body table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }
        .markdown-body blockquote {
            padding: 0 1em;
            color: #57606a;
            border-left: 0.25em solid #d0d7de;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-body hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #d0d7de;
            border: 0;
        }
        .markdown-body a {
            color: #0969da;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-green-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-train text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">JR Pass Purchase System</h1>
                        <p class="text-green-100">機能詳細ドキュメント</p>
                    </div>
                </div>
                <div class="flex space-x-4">
                    <a href="/" class="bg-white text-green-600 px-4 py-2 rounded-lg hover:bg-green-50 transition">
                        <i class="fas fa-home mr-2"></i>
                        ホーム
                    </a>
                    <a href="/jrpass" class="bg-green-700 text-white px-4 py-2 rounded-lg hover:bg-green-800 transition">
                        <i class="fas fa-ticket-alt mr-2"></i>
                        JRパス購入
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Table of Contents Sidebar -->
    <div class="container mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sidebar -->
            <aside class="lg:w-64 flex-shrink-0">
                <div class="bg-white rounded-lg shadow-lg p-6 sticky top-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-list-ul text-green-600 mr-2"></i>
                        目次
                    </h3>
                    <nav id="toc" class="space-y-2 text-sm">
                        <!-- TOC will be generated here -->
                    </nav>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1">
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <!-- Loading indicator -->
                    <div id="loading" class="text-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-green-600 mb-4"></i>
                        <p class="text-gray-600">ドキュメントを読み込み中...</p>
                    </div>
                    
                    <!-- Markdown content -->
                    <div id="markdown-content" class="markdown-body hidden"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 FlightSearch. All rights reserved.</p>
            <p class="text-sm text-gray-400 mt-2">JR Pass Purchase System - Technical Documentation</p>
        </div>
    </footer>

    <script>
        // Fetch and render markdown
        async function loadMarkdown() {
            try {
                const response = await fetch('/static/JRPASS_FEATURES.md');
                if (!response.ok) {
                    throw new Error('Failed to load documentation');
                }
                
                const markdown = await response.text();
                
                // Configure marked options
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: true
                });
                
                // Convert markdown to HTML
                const html = marked.parse(markdown);
                
                // Display content
                document.getElementById('loading').classList.add('hidden');
                const contentDiv = document.getElementById('markdown-content');
                contentDiv.innerHTML = html;
                contentDiv.classList.remove('hidden');
                
                // Generate table of contents
                generateTOC();
                
                // Add smooth scroll to anchor links
                addSmoothScroll();
                
            } catch (error) {
                console.error('Error loading markdown:', error);
                document.getElementById('loading').innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl text-red-600 mb-4"></i>
                    <p class="text-gray-600">ドキュメントの読み込みに失敗しました</p>
                    <p class="text-sm text-gray-500 mt-2">${error.message}</p>
                `;
            }
        }
        
        // Generate table of contents
        function generateTOC() {
            const content = document.getElementById('markdown-content');
            const headings = content.querySelectorAll('h2, h3');
            const toc = document.getElementById('toc');
            
            headings.forEach((heading, index) => {
                const level = heading.tagName === 'H2' ? 0 : 1;
                const id = `heading-${index}`;
                heading.id = id;
                
                const link = document.createElement('a');
                link.href = `#${id}`;
                link.textContent = heading.textContent;
                link.className = `block py-1 hover:text-green-600 transition ${level === 1 ? 'pl-4 text-gray-600' : 'font-semibold text-gray-800'}`;
                
                toc.appendChild(link);
            });
        }
        
        // Add smooth scroll behavior
        function addSmoothScroll() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        }
        
        // Load markdown on page load
        window.addEventListener('DOMContentLoaded', loadMarkdown);
    </script>
</body>
</html>
